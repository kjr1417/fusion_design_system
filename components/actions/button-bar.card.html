<!-- @dsCard group="Components" viewport="760x420" name="ButtonBar" subtitle="Status text + primary/secondary/tertiary actions, collapsing to an overflow menu on collision" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="../../salt-components.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;padding:24px;background:var(--salt-palette-background-secondary)}
  .glabel{font-family:var(--salt-text-fontFamily);font-size:13px;font-weight:600;color:var(--salt-content-primary-foreground);margin-bottom:10px}
  .hint{font-family:var(--salt-text-fontFamily);font-size:12px;color:var(--salt-content-secondary-foreground);margin-bottom:16px}
  .resizer{resize:horizontal;overflow:auto;border:1px dashed var(--salt-color-gray-400);min-width:220px;max-width:100%;width:700px;padding:0}
  .group{margin-bottom:28px}
</style>
</head>
<body class="salt-theme">
<div id="root"></div>
<script type="text/babel">
const { ButtonBar } = window.FusionDesignSystem_6db751;
function App() {
  const noop = () => {};
  return (
    <div>
      <div className="group">
        <div className="glabel">Full width</div>
        <div className="hint">Drag the bottom-right corner of the dashed box to narrow it and watch the collision order: status text drops first, then actions collapse into the overflow menu — the primary action and error banner never move.</div>
        <div className="resizer">
          <ButtonBar
            statusMessage="Last saved: 2:41pm"
            primaryAction={{ label: "Save", onClick: noop }}
            secondaryActions={[{ label: "Save as draft", onClick: noop }]}
            tertiaryActions={[{ label: "Reset", onClick: noop }]}
          />
        </div>
      </div>
      <div className="group">
        <div className="glabel">With error banner</div>
        <div className="resizer">
          <ButtonBar
            statusMessage="Last saved: 2:41pm"
            errorMessage="3 fields need attention"
            primaryAction={{ label: "Submit", onClick: noop }}
            secondaryActions={[{ label: "Save as draft", onClick: noop }, { label: "Preview", onClick: noop }]}
            tertiaryActions={[{ label: "Cancel", onClick: noop }]}
          />
        </div>
      </div>
      <div className="group">
        <div className="glabel">Primary action only</div>
        <div className="resizer">
          <ButtonBar primaryAction={{ label: "Continue", onClick: noop }} />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
