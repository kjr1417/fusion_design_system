<!-- @dsCard group="Brand" viewport="900x260" name="Geometric motifs" subtitle="Empty-state marks — accent blue sweeps along the stroke on hover" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--salt-palette-background-primary)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px;border:1px solid var(--salt-color-gray-200);border-radius:var(--salt-palette-corner);background:var(--salt-editable-primary-background)}
  .cap{font-family:var(--salt-text-fontFamily);font-size:12px;color:var(--salt-content-secondary-foreground)}
  .acc{stop-color:var(--salt-palette-accent)}
  .gry{stop-color:var(--salt-color-gray-400)}
  .dash{stroke-dasharray:4 4}
  .dot{stroke-dasharray:1.5 4;stroke-linecap:round}
  svg .geo{fill:none;stroke-width:1.1}
</style>
</head>
<body class="salt-theme">
<div class="grid">
  <div class="cell">
    <svg id="m1" width="120" height="120" viewBox="0 0 120 120" aria-label="Cube">
      <defs><linearGradient id="f1" x1="0" y1="0" x2="1" y2="0">
        <stop class="acc" offset="0"/>
        <stop class="acc" offset="0"><animate attributeName="offset" begin="m1.mouseenter" dur="1.2s" to="1" fill="freeze"/><animate attributeName="offset" begin="m1.mouseleave" dur="0.5s" to="0" fill="freeze"/></stop>
        <stop class="gry" offset="0"><animate attributeName="offset" begin="m1.mouseenter" dur="1.2s" to="1" fill="freeze"/><animate attributeName="offset" begin="m1.mouseleave" dur="0.5s" to="0" fill="freeze"/></stop>
        <stop class="gry" offset="1"/>
      </linearGradient></defs>
      <g class="geo" stroke="url(#f1)">
        <g class="dash">
          <line x1="30" y1="45" x2="110" y2="85"/><line x1="90" y1="45" x2="50" y2="85"/>
          <line x1="90" y1="105" x2="50" y2="25"/><line x1="30" y1="105" x2="110" y2="25"/>
          <line x1="30" y1="45" x2="90" y2="105"/><line x1="90" y1="45" x2="30" y2="105"/>
          <line x1="50" y1="25" x2="110" y2="85"/><line x1="110" y1="25" x2="50" y2="85"/>
          <line x1="30" y1="75" x2="110" y2="55"/><line x1="70" y1="35" x2="70" y2="95"/>
        </g>
        <rect x="30" y="45" width="60" height="60"/>
        <rect x="50" y="25" width="60" height="60"/>
        <line x1="30" y1="45" x2="50" y2="25"/><line x1="90" y1="45" x2="110" y2="25"/>
        <line x1="90" y1="105" x2="110" y2="85"/><line x1="30" y1="105" x2="50" y2="85"/>
      </g>
    </svg>
    <span class="cap">Cube</span>
  </div>

  <div class="cell">
    <svg id="m2" width="120" height="120" viewBox="0 0 120 120" aria-label="Circle">
      <defs><linearGradient id="f2" x1="0" y1="0" x2="1" y2="0">
        <stop class="acc" offset="0"/>
        <stop class="acc" offset="0"><animate attributeName="offset" begin="m2.mouseenter" dur="1.2s" to="1" fill="freeze"/><animate attributeName="offset" begin="m2.mouseleave" dur="0.5s" to="0" fill="freeze"/></stop>
        <stop class="gry" offset="0"><animate attributeName="offset" begin="m2.mouseenter" dur="1.2s" to="1" fill="freeze"/><animate attributeName="offset" begin="m2.mouseleave" dur="0.5s" to="0" fill="freeze"/></stop>
        <stop class="gry" offset="1"/>
      </linearGradient></defs>
      <g class="geo" stroke="url(#f2)">
        <circle cx="60" cy="60" r="52"/>
        <g class="dash">
          <rect x="24" y="24" width="72" height="72"/>
          <rect x="24" y="24" width="72" height="72" transform="rotate(45 60 60)"/>
          <rect x="34" y="34" width="52" height="52" transform="rotate(22.5 60 60)"/>
          <line x1="8" y1="60" x2="112" y2="60"/><line x1="60" y1="8" x2="60" y2="112"/>
        </g>
      </g>
    </svg>
    <span class="cap">Circle</span>
  </div>

  <div class="cell">
    <svg id="m3" width="120" height="120" viewBox="0 0 120 120" aria-label="Atom">
      <defs><linearGradient id="f3" x1="0" y1="0" x2="1" y2="0">
        <stop class="acc" offset="0"/>
        <stop class="acc" offset="0"><animate attributeName="offset" begin="m3.mouseenter" dur="1.2s" to="1" fill="freeze"/><animate attributeName="offset" begin="m3.mouseleave" dur="0.5s" to="0" fill="freeze"/></stop>
        <stop class="gry" offset="0"><animate attributeName="offset" begin="m3.mouseenter" dur="1.2s" to="1" fill="freeze"/><animate attributeName="offset" begin="m3.mouseleave" dur="0.5s" to="0" fill="freeze"/></stop>
        <stop class="gry" offset="1"/>
      </linearGradient></defs>
      <g class="geo" stroke="url(#f3)">
        <g class="dot">
          <ellipse cx="60" cy="60" rx="50" ry="18"/>
          <ellipse cx="60" cy="60" rx="50" ry="18" transform="rotate(60 60 60)"/>
          <ellipse cx="60" cy="60" rx="50" ry="18" transform="rotate(120 60 60)"/>
        </g>
        <circle cx="60" cy="60" r="9"/>
      </g>
      <circle cx="60" cy="60" r="5" fill="url(#f3)"/>
    </svg>
    <span class="cap">Atom</span>
  </div>

  <div class="cell">
    <svg id="m4" width="120" height="120" viewBox="0 0 120 120" aria-label="Octahedron">
      <defs><linearGradient id="f4" x1="0" y1="0" x2="1" y2="0">
        <stop class="acc" offset="0"/>
        <stop class="acc" offset="0"><animate attributeName="offset" begin="m4.mouseenter" dur="1.2s" to="1" fill="freeze"/><animate attributeName="offset" begin="m4.mouseleave" dur="0.5s" to="0" fill="freeze"/></stop>
        <stop class="gry" offset="0"><animate attributeName="offset" begin="m4.mouseenter" dur="1.2s" to="1" fill="freeze"/><animate attributeName="offset" begin="m4.mouseleave" dur="0.5s" to="0" fill="freeze"/></stop>
        <stop class="gry" offset="1"/>
      </linearGradient></defs>
      <g class="geo" stroke="url(#f4)">
        <g class="dot">
          <line x1="60" y1="12" x2="60" y2="108"/>
          <line x1="12" y1="60" x2="108" y2="60"/>
          <path d="M60 12 L108 60 L60 108 L12 60 Z"/>
        </g>
        <circle cx="12" cy="60" r="4"/><circle cx="108" cy="60" r="4"/>
      </g>
      <circle cx="60" cy="12" r="3.5" fill="url(#f4)"/><circle cx="60" cy="108" r="3.5" fill="url(#f4)"/>
    </svg>
    <span class="cap">Octahedron</span>
  </div>

  <div class="cell">
    <svg id="m5" width="120" height="120" viewBox="0 0 120 120" aria-label="Pentagon">
      <defs><linearGradient id="f5" x1="0" y1="0" x2="1" y2="0">
        <stop class="acc" offset="0"/>
        <stop class="acc" offset="0"><animate attributeName="offset" begin="m5.mouseenter" dur="1.2s" to="1" fill="freeze"/><animate attributeName="offset" begin="m5.mouseleave" dur="0.5s" to="0" fill="freeze"/></stop>
        <stop class="gry" offset="0"><animate attributeName="offset" begin="m5.mouseenter" dur="1.2s" to="1" fill="freeze"/><animate attributeName="offset" begin="m5.mouseleave" dur="0.5s" to="0" fill="freeze"/></stop>
        <stop class="gry" offset="1"/>
      </linearGradient></defs>
      <g class="geo" stroke="url(#f5)">
        <g class="dot">
          <path d="M60 20 L100 50 L84 98 L36 98 L20 50 Z"/>
          <line x1="60" y1="64" x2="60" y2="20"/><line x1="60" y1="64" x2="100" y2="50"/>
          <line x1="60" y1="64" x2="84" y2="98"/><line x1="60" y1="64" x2="36" y2="98"/>
          <line x1="60" y1="64" x2="20" y2="50"/>
        </g>
        <circle cx="60" cy="20" r="8"/><circle cx="100" cy="50" r="8"/><circle cx="84" cy="98" r="8"/><circle cx="36" cy="98" r="8"/><circle cx="20" cy="50" r="8"/><circle cx="60" cy="64" r="8"/>
      </g>
      <g fill="url(#f5)"><circle cx="60" cy="20" r="1.5"/><circle cx="100" cy="50" r="1.5"/><circle cx="84" cy="98" r="1.5"/><circle cx="36" cy="98" r="1.5"/><circle cx="20" cy="50" r="1.5"/><circle cx="60" cy="64" r="1.5"/></g>
    </svg>
    <span class="cap">Pentagon</span>
  </div>
</div>
</body>
</html>
