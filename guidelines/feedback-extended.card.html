<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="../../salt-components.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:16px;display:flex;flex-direction:column;gap:20px}</style>
</head>
<body class="salt-theme">
<div id="root"></div>
<script type="text/babel">
const { Spinner, ProgressBar, StatusIndicator, BannerStack } = window.FusionDesignSystem_6db751;
function App() {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ display: "flex", gap: 32, alignItems: "center" }}>
        <Spinner label="Deploying agent..." />
        <StatusIndicator status="success" label="All systems operational" />
        <StatusIndicator status="warning" label="Degraded performance" />
      </div>
      <ProgressBar value={72} label="Evaluating agent" style={{ maxWidth: 320 }} />
      <BannerStack
        banners={[
          { status: "success", message: "3 files uploaded successfully." },
          { status: "error", message: "onboarding-form.pdf exceeds the 10MB limit." },
          { status: "warning", message: "2 rows were skipped due to missing account IDs." },
        ]}
        style={{ maxWidth: 420 }}
      />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
