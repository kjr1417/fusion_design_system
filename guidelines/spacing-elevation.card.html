<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:24px;display:flex;gap:24px;background:var(--salt-palette-background-secondary);font:11px/1 var(--salt-typography-fontFamily-sans)}
.col{display:flex;flex-direction:column;align-items:center;gap:10px}
.box{width:64px;height:48px;background:#fff;border-radius:8px}
</style></head>
<body class="salt-theme">
<div class="col"><div class="box" style="box-shadow:var(--salt-shadow-lowest)"></div>lowest</div>
<div class="col"><div class="box" style="box-shadow:var(--salt-shadow-lower)"></div>lower</div>
<div class="col"><div class="box" style="box-shadow:var(--salt-shadow-low)"></div>low</div>
<div class="col"><div class="box" style="box-shadow:var(--salt-shadow-mediumLow)"></div>mediumLow</div>
<div class="col"><div class="box" style="box-shadow:var(--salt-shadow-medium)"></div>medium</div>
</body></html>
