<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="8px base unit (medium density); 25/50/75/100/150/200/250/300" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:16px;display:flex;align-items:flex-end;gap:6px;font:11px/1 var(--salt-typography-fontFamily-sans)}
.col{display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:20px;background:var(--salt-palette-accent)}
</style></head>
<body class="salt-theme">
<div class="col"><div class="bar" style="height:var(--salt-spacing-25)"></div>25</div>
<div class="col"><div class="bar" style="height:var(--salt-spacing-50)"></div>50</div>
<div class="col"><div class="bar" style="height:var(--salt-spacing-75)"></div>75</div>
<div class="col"><div class="bar" style="height:var(--salt-spacing-100)"></div>100</div>
<div class="col"><div class="bar" style="height:var(--salt-spacing-150)"></div>150</div>
<div class="col"><div class="bar" style="height:var(--salt-spacing-200)"></div>200</div>
<div class="col"><div class="bar" style="height:var(--salt-spacing-250)"></div>250</div>
<div class="col"><div class="bar" style="height:var(--salt-spacing-300)"></div>300</div>
</body></html>
