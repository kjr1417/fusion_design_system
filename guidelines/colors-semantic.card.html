<!-- @dsCard group="Colors" viewport="700x140" name="Semantic status" subtitle="Positive, negative, warning, info — used by Banner, Input validation, status dots" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:16px;display:flex;gap:12px;font:12px/1.4 var(--salt-typography-fontFamily-sans)}
.col{flex:1;display:flex;flex-direction:column;gap:6px}
.sw{height:36px;border-radius:6px;display:flex;align-items:center;padding-left:10px;color:#fff;font-weight:600}
</style></head>
<body class="salt-theme">
<div class="col"><div class="sw" style="background:var(--salt-palette-positive)">Positive</div></div>
<div class="col"><div class="sw" style="background:var(--salt-palette-negative)">Negative</div></div>
<div class="col"><div class="sw" style="background:var(--salt-palette-warning)">Warning</div></div>
<div class="col"><div class="sw" style="background:var(--salt-palette-info)">Info</div></div>
</body></html>
