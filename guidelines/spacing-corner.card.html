<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:16px;display:flex;gap:14px;align-items:center;font:11px/1 var(--salt-typography-fontFamily-sans)}
.col{display:flex;flex-direction:column;align-items:center;gap:6px}
.box{width:48px;height:48px;background:var(--salt-color-gray-200)}
</style></head>
<body class="salt-theme">
<div class="col"><div class="box" style="border-radius:var(--salt-palette-corner-weaker)"></div>weaker</div>
<div class="col"><div class="box" style="border-radius:var(--salt-palette-corner-weak)"></div>weak</div>
<div class="col"><div class="box" style="border-radius:var(--salt-palette-corner)"></div>default</div>
<div class="col"><div class="box" style="border-radius:var(--salt-palette-corner-strong)"></div>strong</div>
<div class="col"><div class="box" style="border-radius:var(--salt-palette-corner-stronger)"></div>stronger</div>
<div class="col"><div class="box" style="border-radius:var(--salt-palette-corner-strongest)"></div>pill</div>
</body></html>
