<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="AI Chat" description="Full Fusion conversational surface: chat-history sidebar, streaming agent replies, clarifying-question cards with radio options and free-text, live status/tool-use updates, typing/loading states, and an OmniInput composer — reusing the dashboard header + sidebar shell." -->
<helmet>
<script src="./ds-base.js"></script>
<style>
  *{box-sizing:border-box}
  a{color:var(--salt-content-accent-foreground);text-decoration:none}
  a:hover{color:var(--salt-color-blue-700)}
  .chat-header-search .saltInput{width:100%!important}
  .chat-side .saltButton{width:100%;justify-content:center;font-size:16px;font-weight:700}
  .chat-item{display:flex;align-items:center;width:100%;text-align:left;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:16px;font-weight:600;color:var(--salt-content-primary-foreground);padding:12px 16px;border-radius:10px;position:relative;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chat-item:hover{background:var(--salt-actionable-subtle-background-hover)}
  .chat-item-active{background:color-mix(in srgb,var(--salt-palette-accent) 12%,transparent);font-weight:800}
  .chat-item-active::before{content:"";position:absolute;left:3px;top:9px;bottom:9px;width:5px;border-radius:3px;background:var(--salt-palette-accent)}
  .chat-scroll{flex:1;min-height:0;overflow-y:auto;padding:36px 24px}
  .chat-col{max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:26px}
  .msg-user{align-self:flex-end;max-width:82%;background:var(--salt-color-gray-100);border-radius:18px;padding:14px 20px;font-size:17px;line-height:1.55;text-wrap:pretty}
  .msg-agent{align-self:stretch;font-size:17px;line-height:1.65;text-wrap:pretty}
  .msg-meta{font-size:14px;color:var(--salt-content-secondary-foreground);margin-bottom:8px}
  .status-row{display:flex;align-items:center;gap:12px;font-size:16px;color:var(--salt-content-secondary-foreground)}
  .status-row-done{color:var(--salt-content-primary-foreground)}
  .chat-qcard{border:1px solid var(--salt-container-primary-borderColor);border-left:5px solid var(--salt-palette-accent);border-radius:18px;padding:28px 32px;box-shadow:var(--salt-overlayable-shadow);background:var(--salt-container-primary-background)}
  .chat-opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:17px;color:var(--salt-content-primary-foreground);padding:11px 6px;border-radius:8px}
  .chat-opt:hover{background:var(--salt-actionable-subtle-background-hover)}
  .chat-radio{width:20px;height:20px;border-radius:999px;border:2px solid var(--salt-color-gray-400);flex-shrink:0}
  .chat-opt:hover .chat-radio{border-color:var(--salt-palette-accent);box-shadow:inset 0 0 0 3px var(--salt-container-primary-background),inset 0 0 0 6px var(--salt-palette-accent)}
  .chat-custom{width:100%;margin-top:14px;padding:14px 18px;border:1px solid var(--salt-color-gray-300);border-radius:12px;font-family:inherit;font-size:16px;background:var(--salt-container-primary-background);color:var(--salt-content-primary-foreground)}
  .chat-custom::placeholder{color:var(--salt-content-secondary-foreground)}
  .chat-custom:focus{outline:none;border-color:var(--salt-palette-accent)}
  @keyframes chatdot{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
  .typing{display:inline-flex;gap:5px;align-items:center;padding:4px 0}
  .typing span{width:8px;height:8px;border-radius:999px;background:var(--salt-content-secondary-foreground);animation:chatdot 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  .chat-composer .fusionOmni{max-width:820px}
</style>
</helmet>
<div class="salt-theme salt-density-low" style="min-height:100vh;height:100vh;background:var(--salt-palette-background-secondary);font-family:var(--salt-text-fontFamily);color:var(--salt-content-primary-foreground);display:flex;flex-direction:column">

  <x-import component-from-global-scope="FusionDesignSystem_5ec875.GlobalNav" hint-size="100%,68px" style="flex-shrink:0"></x-import>

  <div style="display:flex;flex:1;min-height:0">

    <aside class="chat-side" style="width:280px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;padding:24px 20px;min-height:0">
      <div style="margin-bottom:12px">
        <x-import component-from-global-scope="FusionDesignSystem_5ec875.Button" appearance="bordered" sentiment="neutral" onClick="{{ newChat }}" hint-size="100%,44px"><span style="display:inline-flex;align-items:center;gap:8px">{{ plusIcon }} New Chat</span></x-import>
      </div>
      <div style="flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:4px">
        <sc-for list="{{ chats }}" as="c" hint-placeholder-count="10">
          <button class="chat-item {{ c.activeClass }}" onClick="{{ c.onClick }}">{{ c.title }}</button>
        </sc-for>
      </div>
      <x-import component-from-global-scope="FusionDesignSystem_5ec875.IconButton" appearance="transparent" sentiment="neutral" aria-label="Collapse sidebar" hint-size="40px,40px">{{ collapseIcon }}</x-import>
    </aside>

    <main style="flex:1;min-width:0;display:flex;flex-direction:column;background:var(--salt-container-primary-background);border-top-left-radius:24px;box-shadow:0 0 24px rgba(16,24,32,.13);position:relative;z-index:2;min-height:0">

      <div class="chat-scroll" ref="{{ msgRef }}">
        <div class="chat-col">
          <sc-for list="{{ view }}" as="m" hint-placeholder-count="3">

            <sc-if value="{{ m.isUser }}" hint-placeholder-val="{{ true }}">
              <div class="msg-user">{{ m.text }}</div>
            </sc-if>

            <sc-if value="{{ m.isAgent }}">
              <div class="msg-agent"><div class="msg-meta">{{ m.name }} · {{ m.time }}</div><div>{{ m.text }}</div></div>
            </sc-if>

            <sc-if value="{{ m.isStatus }}">
              <div class="status-row {{ m.doneClass }}">
                <sc-if value="{{ m.pending }}"><x-import component-from-global-scope="FusionDesignSystem_5ec875.Spinner" size="{{ 16 }}" hint-size="16px,16px"></x-import></sc-if>
                <sc-if value="{{ m.done }}"><span style="color:var(--salt-color-green-600);display:inline-flex">{{ m.icon }}</span></sc-if>
                <span>{{ m.text }}</span>
              </div>
            </sc-if>

            <sc-if value="{{ m.isTyping }}">
              <div class="msg-agent"><div class="msg-meta">{{ agentName }}</div><div class="typing"><span></span><span></span><span></span></div></div>
            </sc-if>

            <sc-if value="{{ m.isQuestion }}">
              <div class="chat-qcard">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
                  <span style="font-size:14px;font-weight:700;color:var(--salt-content-secondary-foreground)">{{ m.stepLabel }}</span>
                  <sc-if value="{{ m.canSkip }}"><a href="#" onClick="{{ m.onSkip }}" style="font-size:14px;font-weight:800;letter-spacing:.05em">SKIP</a></sc-if>
                </div>
                <h3 style="margin:0 0 16px;font-size:24px;font-weight:800;letter-spacing:-.01em">{{ m.title }}</h3>
                <sc-if value="{{ m.answered }}">
                  <div style="display:inline-flex;align-items:center;gap:8px;font-size:16px;color:var(--salt-content-secondary-foreground)">{{ m.checkIcon }}{{ m.chosen }}</div>
                </sc-if>
                <sc-if value="{{ m.open }}">
                  <div style="display:flex;flex-direction:column;gap:2px">
                    <sc-for list="{{ m.options }}" as="opt" hint-placeholder-count="4">
                      <button class="chat-opt" onClick="{{ opt.onSelect }}"><span class="chat-radio"></span>{{ opt.label }}</button>
                    </sc-for>
                  </div>
                  <input class="chat-custom" value="{{ custom }}" onInput="{{ onCustomInput }}" onKeyDown="{{ m.onCustomKey }}" placeholder="Or type your own answer…">
                </sc-if>
              </div>
            </sc-if>

          </sc-for>
        </div>
      </div>

      <div class="chat-composer" style="border-top:1px solid var(--salt-separable-secondary-borderColor);padding:20px 24px;flex-shrink:0">
        <div style="max-width:820px;margin:0 auto">
          <x-import component-from-global-scope="FusionDesignSystem_5ec875.OmniInput" placeholders="{{ composerPlaceholders }}" modes="{{ composerModes }}" suggestions="{{ emptyArr }}" onSend="{{ onSend }}" hint-size="100%,150px" style="width:100%"></x-import>
        </div>
      </div>

    </main>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:800},&quot;agentName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Builder_Agent_v2&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Agent&quot;},&quot;enableClarifyingQuestions&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Behavior&quot;}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.msgRef = React.createRef();
    this.state = {
      chats: [
        'Help me write a risk report', 'Summarize the Q4 board deck', 'Generate Python code for ETL',
        'What are the compliance rules', 'Draft an email to the desk lead', 'Explain the difference in models',
        'Create a SQL query to join', 'Review this Java code for bugs', 'What are best practices for RAG',
        'Help me prepare for the audit',
      ],
      activeChat: 0,
      messages: this.initialMessages(),
      step: 0,
      custom: '',
    };
  }

  dsIcon(name, size = 20) {
    const url = `url(../../assets/icons/${name}.svg)`;
    return React.createElement('span', { style: { display: 'inline-block', width: size, height: size, flexShrink: 0, background: 'currentColor', WebkitMask: `${url} center/contain no-repeat`, mask: `${url} center/contain no-repeat` } });
  }

  agentName() { return this.props.agentName || 'Builder_Agent_v2'; }
  now() { const d = new Date(); let h = d.getHours(); const m = d.getMinutes(); const ap = h >= 12 ? 'pm' : 'am'; h = h % 12 || 12; return h + ':' + (m < 10 ? '0' + m : m) + ap; }

  getFlow() {
    return [
      { title: 'Where is your client email data stored?', options: [
        'Microsoft Outlook / Exchange — connect via Microsoft Graph API',
        'Gmail / Google Workspace — authorize via Gmail API',
        "I'll upload an export (CSV, JSON, or .pst) of the last 60 days",
        'Our CRM already has email history pulled in (Salesforce, Dynamics)',
      ] },
      { title: 'How should Platinum-tier urgencies be flagged?', options: [
        'Send an email alert to the desk lead',
        'Post to #advisory-ops in Slack / Teams',
        'Roll them into a daily 8am digest',
        'Create a follow-up task in our CRM',
      ] },
    ];
  }

  initialMessages() {
    const base = [
      { role: 'user', text: 'Triage the last 60 days of advisory-desk emails — cluster by theme, flag Platinum-tier urgencies, and produce a leadership-ready summary report.' },
    ];
    if (this.props && this.props.enableClarifyingQuestions === false) {
      base.push({ role: 'agent', name: this.agentName(), time: this.now(), text: 'On it — spinning up the triage workflow now.' });
    } else {
      base.push({ role: 'agent', name: this.agentName(), time: '4:43pm', text: 'I have a few questions before I start building —' });
      base.push({ role: 'question', qi: 0 });
    }
    return base;
  }

  componentDidUpdate() {
    const el = this.msgRef.current;
    if (el) el.scrollTop = el.scrollHeight;
  }

  answer(qi, label) {
    this.setState((s) => {
      const messages = s.messages.map((m) => (m.role === 'question' && m.qi === qi) ? { ...m, answered: true, chosen: label } : m);
      messages.push({ role: 'user', text: label });
      const flow = this.getFlow();
      if (qi + 1 < flow.length) { messages.push({ role: 'question', qi: qi + 1 }); }
      else { setTimeout(() => this.startBuild(), 450); }
      return { messages: [...messages], custom: '', step: qi + 1 };
    });
  }

  startBuild() {
    const steps = [
      'Connecting to Microsoft Graph API…',
      'Scanning 1,240 emails from the last 60 days…',
      'Clustering by theme — 8 themes identified…',
      'Flagging Platinum-tier urgencies — 12 flagged…',
      'Composing the leadership summary…',
    ];
    let idx = 0;
    const addNext = () => {
      this.setState((s) => {
        const messages = s.messages.map((m) => m.role === 'status' ? { ...m, done: true } : m);
        if (idx < steps.length) messages.push({ role: 'status', text: steps[idx], done: false });
        return { messages: [...messages] };
      });
      idx++;
      if (idx <= steps.length) setTimeout(addNext, 1150);
      else setTimeout(() => this.finishBuild(), 350);
    };
    addNext();
  }

  finishBuild() {
    this.setState((s) => {
      const messages = s.messages.map((m) => m.role === 'status' ? { ...m, done: true } : m);
      messages.push({ role: 'agent', name: this.agentName(), time: this.now(), text: 'Done. I triaged 1,240 advisory-desk emails into 8 themes and flagged 12 Platinum-tier urgencies. Top themes: fee queries (31%), settlement delays (18%), and onboarding friction (14%). The leadership summary is ready — want me to export it as a PDF or post it to #advisory-ops?' });
      return { messages: [...messages] };
    });
  }

  cannedReply(t) {
    const clean = t.trim().replace(/\s+/g, ' ');
    const short = clean.length > 64 ? clean.slice(0, 64) + '…' : clean;
    return 'Got it — I\u2019ll work on \u201C' + short + '\u201D. Let me line up the right tools and data sources, then I\u2019ll walk you through the plan.';
  }

  sendMessage(t) {
    if (!t || !t.trim()) return;
    this.setState((s) => ({ messages: [...s.messages, { role: 'user', text: t }, { role: 'typing' }] }));
    setTimeout(() => {
      this.setState((s) => {
        const messages = s.messages.filter((m) => m.role !== 'typing');
        messages.push({ role: 'agent', name: this.agentName(), time: this.now(), text: this.cannedReply(t) });
        return { messages };
      });
    }, 1500);
  }

  newChat() {
    this.setState({ activeChat: -1, custom: '', step: 0, messages: [
      { role: 'agent', name: this.agentName(), time: this.now(), text: 'New chat started. What would you like to build, analyze, or discover today?' },
    ] });
  }

  seedFor(i) {
    if (i === 0) return this.initialMessages();
    const title = this.state.chats[i];
    return [
      { role: 'user', text: title },
      { role: 'agent', name: this.agentName(), time: this.now(), text: 'Sure — here\u2019s a starting point for \u201C' + title + '\u201D. Ask me to go deeper on any part, or send a follow-up below.' },
    ];
  }

  selectChat(i) { this.setState({ activeChat: i, custom: '', step: 0, messages: this.seedFor(i) }); }

  renderVals() {
    const S = this.state;
    const flow = this.getFlow();
    const check = this.dsIcon('check', 16);
    const view = S.messages.map((m, i) => {
      const base = { key: i, isUser: m.role === 'user', isAgent: m.role === 'agent', isStatus: m.role === 'status', isQuestion: m.role === 'question', isTyping: m.role === 'typing' };
      if (m.role === 'agent') return { ...base, name: m.name, time: m.time, text: m.text };
      if (m.role === 'user') return { ...base, text: m.text };
      if (m.role === 'status') return { ...base, text: m.text, done: !!m.done, pending: !m.done, doneClass: m.done ? 'status-row-done' : '', icon: this.dsIcon('check', 16) };
      if (m.role === 'question') {
        const q = flow[m.qi];
        return {
          ...base,
          stepLabel: (m.qi + 1) + ' of ' + flow.length,
          title: q.title,
          answered: !!m.answered,
          open: !m.answered,
          canSkip: !m.answered,
          chosen: m.chosen || '',
          checkIcon: check,
          options: m.answered ? [] : q.options.map((label) => ({ label, onSelect: () => this.answer(m.qi, label) })),
          onSkip: (e) => { if (e && e.preventDefault) e.preventDefault(); this.answer(m.qi, 'Skipped — use your best judgment'); },
          onCustomKey: (e) => { if (e.key === 'Enter' && this.state.custom.trim()) { e.preventDefault(); this.answer(m.qi, this.state.custom.trim()); } },
        };
      }
      return base;
    });
    return {
      view,
      custom: S.custom,
      agentName: this.agentName(),
      onCustomInput: (e) => this.setState({ custom: e.target.value }),
      onSend: (t) => this.sendMessage(t),
      newChat: () => this.newChat(),
      chats: S.chats.map((c, i) => ({ title: c, activeClass: i === S.activeChat ? 'chat-item-active' : '', onClick: () => this.selectChat(i) })),
      msgRef: this.msgRef,
      emptyArr: [],
      composerModes: ['Search and Discover', 'Build a workflow', 'Analyze data'],
      composerPlaceholders: ['Send a message…', 'Ask a follow-up, or start something new…', 'Describe the workflow you want to build…'],
      searchIcon: this.dsIcon('search', 18),
      bellIcon: this.dsIcon('notification', 20),
      chevronIcon: this.dsIcon('chevron-down', 16),
      collapseIcon: this.dsIcon('chevron-left', 18),
      plusIcon: this.dsIcon('add', 18),
      cmdkHint: React.createElement('span', { style: { display: 'inline-flex', alignItems: 'center', padding: '3px 8px', border: '1px solid var(--salt-color-gray-300)', borderRadius: 6, fontSize: 13, fontWeight: 700, lineHeight: 1, color: 'var(--salt-content-secondary-foreground)', whiteSpace: 'nowrap' } }, '\u2318K'),
    };
  }
}
</script>
</body>
</html>
